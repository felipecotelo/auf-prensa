<script>
(function(){
  var h=location.hash;
  if(h.startsWith('#r?')){
    var p=new URLSearchParams(h.slice(3));
    var tabs=p.get('tabs'), token=p.get('t'), ro=p.get('ro');
    if(tabs) sessionStorage.setItem('auf_rtabs', tabs);
    if(token) sessionStorage.setItem('auf_rtoken', token);
    if(ro==='1') sessionStorage.setItem('auf_ro','1'); else sessionStorage.removeItem('auf_ro');
    sessionStorage.removeItem('auf_authed');
  }
  location.replace('/');
})();
</script>
